name: Deploy

# Gated on CI: this runs only after the "CI" workflow finishes on `main`.
# The `if` below then filters to *successful* CI runs, so a red build never
# reaches production. Deploys are never triggered directly by a push.
#
# `workflow_dispatch` also exposes a manual "Run workflow" button in the Actions
# UI, which deploys the current tip of the chosen branch (bypassing the CI gate
# — use for hotfixes / first deploy).
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # never abort a half-finished deploy/migration

permissions:
  contents: read

jobs:
  deploy:
    name: migrate · deploy
    # Deploy on a successful CI run, or on a manual dispatch (no CI run to gate).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the exact commit CI validated; on manual dispatch this is
          # empty, so checkout falls back to the dispatched branch's tip.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Apply any new D1 migrations before deploying the code that needs them.
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply plans --remote

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
